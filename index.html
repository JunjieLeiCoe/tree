<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Sakura Love Tree</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    
    <link type="text/css" rel="stylesheet" href="./index_files/default.css">
    <script type="text/javascript" src="./index_files/jquery.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-parser.js"></script>
    <script type="text/javascript" src="./index_files/jscex-jit.js"></script>
    <script type="text/javascript" src="./index_files/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-async.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="./index_files/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./index_files/love.js" charset="utf-8"></script>
    <script type="text/javascript" src="./config.js"></script>
    
    <style>
        .music-btn {
            position: fixed;
            z-index: 10001;
            top: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 182, 193, 0.5));
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.3), rgba(255, 105, 180, 0.2));
            border: 2px solid rgba(255, 182, 193, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .music-btn:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(255, 182, 193, 0.8));
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.5), rgba(255, 105, 180, 0.4));
        }
        
        .music-btn img {
            width: 30px;
            height: 30px;
            filter: brightness(1.2);
        }
        
        .rotateImages {
            animation: myRotate 4s linear infinite;
        }
        
        @keyframes myRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .title-header {
            text-align: center;
            padding: 20px 0 10px;
            font-size: 28px;
            background: linear-gradient(90deg, #FFB6C1, #FF69B4, #FF1493, #FF69B4, #FFB6C1);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.3));
        }
        
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        .sakura-particle {
            position: fixed;
            pointer-events: none;
            width: 15px;
            height: 15px;
            background: radial-gradient(ellipse at center, #FFB6C1 0%, #FF69B4 50%, transparent 70%);
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            animation: sakuraFall linear infinite;
            z-index: 9999;
        }
        
        @keyframes sakuraFall {
            0% {
                transform: translateY(-100vh) rotate(0deg) translateX(0);
                opacity: 1;
            }
            25% {
                transform: translateY(25vh) rotate(90deg) translateX(20px);
            }
            50% {
                transform: translateY(50vh) rotate(180deg) translateX(-20px);
            }
            75% {
                transform: translateY(75vh) rotate(270deg) translateX(10px);
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(-10px);
                opacity: 0;
            }
        }
        
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1.5s ease-in-out infinite;
            z-index: 9998;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="music-btn" onclick="toggleMusic(this)">
    <img src="https://ajlovechina.github.io/loveBalloon/static/music.png" alt="Music">
</div>
<audio class="song-audio-autoplay" controls loop style="display: none; visibility: hidden">
    <source src="./index_files/music.mp3" type="audio/mp3"/>
</audio>

<div id="main">
    <h1 class="title-header">🌸 Sakura Love Story 🌸</h1>
    
    <div id="error">
        This page uses HTML5 Canvas. Please use a modern browser like 
        <a href="https://www.google.com/chrome/">Chrome</a> or 
        <a href="https://www.mozilla.org/firefox/">Firefox</a>.
    </div>
    
    <div id="wrap">
        <div id="text">
            <div id="code"></div>
        </div>
        <div id="clock-box">
            <span id="clock-box-inside-text"></span>
            <div id="clock"></div>
        </div>
        <canvas id="canvas" width="1100" height="680"></canvas>
    </div>
</div>

<script>
function toggleMusic(btn) {
    var m = document.querySelector('.song-audio-autoplay');
    if (m.paused) {
        m.play();
        btn.classList.add('rotateImages');
    } else {
        m.pause();
        btn.classList.remove('rotateImages');
    }
}

function createSakuraParticles() {
    var container = document.body;
    
    for (var i = 0; i < 15; i++) {
        setTimeout(function() {
            var petal = document.createElement('div');
            petal.className = 'sakura-particle';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 5 + 8) + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            petal.style.width = (Math.random() * 10 + 8) + 'px';
            petal.style.height = (Math.random() * 10 + 8) + 'px';
            container.appendChild(petal);
            
            setTimeout(function() {
                if (petal.parentNode) {
                    petal.parentNode.removeChild(petal);
                }
            }, 15000);
        }, i * 500);
    }
}

function createSparkles() {
    var container = document.body;
    
    for (var i = 0; i < 20; i++) {
        var sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + 'vw';
        sparkle.style.top = Math.random() * 100 + 'vh';
        sparkle.style.animationDelay = Math.random() * 2 + 's';
        sparkle.style.width = (Math.random() * 3 + 2) + 'px';
        sparkle.style.height = sparkle.style.width;
        container.appendChild(sparkle);
    }
}

setInterval(createSakuraParticles, 8000);
createSakuraParticles();
createSparkles();
</script>

<script>
    $('#code').html(config.lines.map(function(item) {
        return '<span class="say">' + item + '</span><br><span class="say"> </span><br>';
    }).reduce(function(a, b) {
        return a + b;
    }));
    
    $("#clock-box-inside-text").html(
        '<span style="color: #FF69B4; font-weight: bold;">' + config.names[0] + '</span>' +
        '<span class="STYLE1"> & </span>' +
        '<span style="color: #FF69B4; font-weight: bold;">' + config.names[1] + '</span>' +
        '<span class="STYLE1"> have been in love for</span>'
    );
</script>

<script>
    (function () {
        var canvas = $('#canvas');

        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        var width = canvas.width();
        var height = canvas.height();

        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(255, 105, 180)",
                scale: 2
            },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]]
            ],
            bloom: {
                num: 700,
                width: 1080,
                height: 650,
            },
            footer: {
                width: 1200,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function (e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0;
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function (e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);

            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background", "rgba(26, 26, 46, 0.3)");
            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var jumpAnimate = eval(Jscex.compile("async", function () {
            var ctx = tree.ctx;
            while (true) {
                tree.ctx.clearRect(0, 0, width, height);
                tree.jump();
                foot.draw();
                $await(Jscex.Async.sleep(25));
            }
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            var together = new Date(config.date);

            $("#code").show().typewriter();
            $("#clock-box").fadeIn(500);
            while (true) {
                timeElapse(together);
                $await(Jscex.Async.sleep(1000));
            }
        }));

        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());

            textAnimate().start();

            $await(jumpAnimate());
        }));

        runAsync().start();
    })();
</script>

</body>
</html>
